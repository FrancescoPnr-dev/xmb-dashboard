name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: REUSE compliance
        uses: fsfe/reuse-action@v5

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gettext libxml2-utils zip

      - name: Validate metadata and config
        run: |
          python3 -m json.tool metadata.json > /dev/null
          xmllint --noout contents/config/main.xml

      - name: Check translations
        run: |
          for po in po/*.po; do
            msgfmt --check --statistics "$po" -o /dev/null
          done

      - name: Build package and check contents
        run: |
          ./tools/make-package.sh
          if unzip -l xmb-dashboard-*.plasmoid | grep -qE " (tools|po)/| README| REUSE"; then
            echo "dev files leaked into the package" && exit 1
          fi
